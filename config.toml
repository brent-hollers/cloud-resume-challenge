title = "Brent Hollers"
baseURL = "https://brenthollers.com/"
theme = "hugo-resume"
languageCode = "en-us"
PygmentsCodeFences = true
PygmentsCodeFencesGuessSyntax = true
PygmentsStyle = "monokai"
enableGitInfo = false

[params]
address = "Atlanta, GA"
email = "drhollers@gmail.com"
favicon = "/favicon.ico"
firstName = "Brent"
lastName = "Hollers"
phone = "1-404-227-1778"
profileImage = "img/Hollers_headshot.png"
showQr = true
showContact = true
showBoards  = false
showCertifications = true
showSocializations = true
sections = ["skills","creations","experience","education","blog"]
vcardfields = [
    "name",
    "image",
    "email",
    "phone",
    "url",
    "title"
]


[[params.handles]]
    name = "LinkedIn"
    link = "https://www.linkedin.com/in/brent-hollers/"

[[params.handles]]
    name = "GitHub"
    link = "https://github.com/brent-hollers/"

[[params.handles]]
    link = "https://stackoverflow.com/users/23691340/brent-hollers"
    name = "Stack Overflow"
    icon = "stack-overflow"

[outputs]
home = ["HTML", "JSON"]

[taxonomies]
tag = "tags"


[mediaTypes]
  [mediaTypes."text/vcard"]
    suffixes = ["vcf"]

[outputFormats]
  [outputFormats.VCard]
    mediaType = "text/vcard"
    baseName = "contact"
    isPlainText = true
    notAlternative = true